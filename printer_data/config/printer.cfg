[include config/toolhead-orbiter-o2s/accelerometer.cfg]
# [include config/probe-cartographer-3d/accelerometer.cfg]
# [include config/accelerometers/mellow-fly-adxl345-usb.cfg]

[input_shaper]
shaper_freq_x: 61.4 # 11000
shaper_type_x: mzv
shaper_freq_y: 42.2 # 5090
shaper_type_y: mzv

[heater_bed]
control: pid
pid_kp: 61.907
pid_ki: 2.548
pid_kd: 376.085

[better_pid extruder continuous]
temps: 90, 150, 200, 250, 270
kps: 15.452, 20.550, 20.539, 25.134, 25.088
kis: 2.146, 5.269, 5.267, 6.445, 6.195
kds: 27.813, 20.036, 20.026, 24.505, 25.401

[extruder] # this will be ignored by the better_pid plugin
control: pid
pid_kp: 1
pid_ki: 1
pid_kd: 1

[virtual_sdcard]
path: /home/gil/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[auto_speed]
results_dir: ~/printer_data/config/AutoSpeed

