[gcode_macro _USER_VARIABLES]
variable_sensorless_homing_enabled: True
gcode:

[gcode_macro _USER_VARIABLES]
variable_x_driver: "tmc5160"
gcode:

[tmc5160 stepper_x]
cs_pin: X_TMCUART
diag1_pin: ^!X_DIAG
spi_software_sclk_pin: DRIVER_SPI_SCK
spi_software_mosi_pin: DRIVER_SPI_MOSI
spi_software_miso_pin: DRIVER_SPI_MISO
interpolate: True
run_current: 1.3
sense_resistor: 0.075
stealthchop_threshold: 999999

[gcode_macro _USER_VARIABLES]
variable_x1_driver: "tmc5160"
gcode:

[tmc5160 stepper_x1]
cs_pin: X1_TMCUART
