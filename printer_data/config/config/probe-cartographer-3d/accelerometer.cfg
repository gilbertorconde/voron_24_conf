###########################################################################################
###################### Onboard accelerometer and resonance tester config ##################
###########################################################################################

# FROM TOOLHEAD:
[adxl345]
cs_pin: cartographer:PA0
spi_bus: spi1
axes_map: x, z, -y

[include ../../macros/helpers/resonance_override.cfg]

[resonance_tester]
accel_chip: adxl345
probe_points: 175, 175, 20
min_freq: 10
max_freq: 188
