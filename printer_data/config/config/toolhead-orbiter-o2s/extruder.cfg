###########################################################################################
###################################### Extruder config ####################################
###########################################################################################

[gcode_macro _USER_VARIABLES]
variable_extruder_enabled = True
gcode:

# you may need to change some setting based on the hotend type you have

[extruder]
step_pin = toolhead:PB3
dir_pin = toolhead:PB4
enable_pin = !toolhead:PC14
microsteps = 32
rotation_distance =  4.69 # Orbiter v2
#rotation_distance = 2.18 # Orbiter quatro
full_steps_per_rotation = 200
nozzle_diameter = 0.400
filament_diameter = 1.750
heater_pin = toolhead:PB9
sensor_pin = toolhead:PA1
pullup_resistor = 2200
sensor_type = PT1000 # hotend speciffic
min_temp = 0
max_temp = 360
pressure_advance = 0.02
pressure_advance_smooth_time = 0.03
max_extrude_only_distance = 500.0
max_extrude_cross_section = 20
min_extrude_temp = 180
#min_extrude_temp = 30
smooth_time = 0.5
max_power = 0.995 # limit heater power to 99.5% to enable autorecovery from short detection
pwm_cycle_time = 0.01

[tmc2240 extruder]
uart_pin = toolhead:PC13
interpolate = false
run_current = 0.85
rref = 12000
stealthchop_threshold = 99999



[firmware_retraction]
retract_length = 1.2
#   The length of filament (in mm) to retract when G10 is activated,
#   and to unretract when G11 is activated (but see
#   unretract_extra_length below). The default is 0 mm.
retract_speed = 120
#   The speed of retraction, in mm/s. The default is 20 mm/s.
unretract_extra_length = 0.0
#   The length (in mm) of *additional* filament to add when
#   unretracting.
unretract_speed = 120
#   The speed of unretraction, in mm/s. The default is 10 mm/s.

[include ../../macros/helpers/hotend_heater_ctrl.cfg]